<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zwiip UI Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: -apple-system, sans-serif; padding: 20px; }
  .phone { width: 375px; height: 812px; background: #0A0A1A; border-radius: 40px; overflow: hidden; position: relative; border: 3px solid #333; }
  .notch { width: 150px; height: 30px; background: #000; border-radius: 0 0 15px 15px; margin: 0 auto; }
  
  .draggable { position: absolute; cursor: move; user-select: none; }
  .draggable:hover { outline: 2px dashed #7B2FBE; }
  .draggable.active { outline: 2px solid #7B2FBE; }
  
  .resizable { resize: both; overflow: hidden; }
  
  .header { left: 0; right: 0; top: 40px; height: 45px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  .logo { font-size: 28px; font-weight: 900; font-style: italic; color: #7B2FBE; }
  .challenge-btn { background: rgba(123,47,190,0.2); border: 1px solid rgba(123,47,190,0.4); border-radius: 12px; padding: 4px 10px; color: #7B2FBE; font-size: 11px; font-weight: 700; }
  
  .categories { left: 0; right: 0; top: 85px; height: 36px; display: flex; gap: 8px; padding: 0 12px; overflow-x: auto; align-items: center; }
  .pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid rgba(123,47,190,0.3); color: #ccc; font-size: 13px; white-space: nowrap; font-weight: 600; }
  .pill.active { background: rgba(123,47,190,0.2); border-color: #7B2FBE; color: #fff; }
  
  .stats { left: 0; right: 0; top: 125px; height: 28px; display: flex; justify-content: center; align-items: center; gap: 12px; }
  .stat { color: #aaa; font-size: 12px; font-weight: 700; }
  .counter { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; color: #888; font-size: 11px; }
  
  .card { left: 16px; right: 16px; top: 158px; bottom: 90px; width: 343px; background: #666; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .card-label { color: #fff; font-size: 18px; font-weight: 700; text-align: center; opacity: 0.7; }
  .card-info { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 12px 16px; display: flex; justify-content: space-between; }
  .card-info span { color: #fff; font-size: 13px; }
  
  .actions { left: 0; right: 0; bottom: 95px; height: 70px; display: flex; justify-content: center; align-items: center; gap: 24px; }
  .action-btn { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; background: rgba(255,255,255,0.08); }
  .action-btn.delete { border: none; }
  .action-btn.undo { width: 50px; height: 50px; }
  .action-btn.keep { border: none; }
  
  .tabbar { left: 0; right: 0; bottom: 0; height: 85px; background: rgba(20,20,40,0.95); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px; }
  .tab { text-align: center; color: #666; font-size: 10px; font-weight: 600; }
  .tab.active { color: #7B2FBE; }
  .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
  
  .controls { position: fixed; top: 20px; right: 20px; background: #222; padding: 16px; border-radius: 12px; color: #fff; font-size: 13px; width: 280px; max-height: 90vh; overflow-y: auto; }
  .controls h3 { margin-bottom: 8px; color: #7B2FBE; }
  .controls label { display: block; margin: 6px 0 2px; color: #aaa; font-size: 11px; }
  .controls input[type=range] { width: 100%; }
  .controls .val { color: #7B2FBE; font-weight: 700; float: right; }
  .controls button { background: #7B2FBE; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 12px; width: 100%; font-weight: 700; }
  .controls pre { background: #111; padding: 8px; border-radius: 6px; font-size: 10px; margin-top: 8px; white-space: pre-wrap; color: #8f8; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="notch"></div>
  
  <div class="draggable header" id="header">
    <span class="logo">Zwiip</span>
    <span class="challenge-btn">⚡ 3 min Challenge</span>
  </div>
  
  <div class="draggable categories" id="categories">
    <span class="pill active">🎞 Alle</span>
    <span class="pill">✨ Memory Lane</span>
    <span class="pill">📁 Album</span>
    <span class="pill">📱 Screenshots</span>
  </div>
  
  <div class="draggable stats" id="stats">
    <span class="stat">❤️ 5</span>
    <span class="stat">📸 12</span>
    <span class="stat">🗑️ 3</span>
    <span class="counter">18/12370</span>
  </div>
  
  <div class="draggable card resizable" id="card">
    <div class="card-label">📷 FOTO<br><small>Træk for at flytte<br>Resize i hjørnet ↘</small></div>
    <div class="card-info">
      <span>1. apr. 2026</span>
      <span>IMG_1602.PNG</span>
    </div>
  </div>
  
  <div class="draggable actions" id="actions">
    <div class="action-btn delete" style="font-size:40px">🗑️</div>
    <div class="action-btn undo" style="font-size:32px">↩️</div>
    <div class="action-btn keep" style="font-size:40px">❤️</div>
  </div>
  
  <div class="tabbar">
    <div class="tab active"><span class="tab-icon">📋</span>Sortér</div>
    <div class="tab"><span class="tab-icon">🗑</span>Kasseret</div>
    <div class="tab"><span class="tab-icon">📄</span>Dubletter</div>
    <div class="tab"><span class="tab-icon">📊</span>Stats</div>
    <div class="tab"><span class="tab-icon">⚙️</span>Opsæt</div>
  </div>
</div>

<div class="controls">
  <h3>🎛 Zwiip Layout Editor</h3>
  <p style="color:#888;font-size:11px;margin-bottom:12px">Træk elementer rundt i telefonen. Resize kortet i hjørnet.</p>
  
  <label>Action knap størrelse <span class="val" id="btnSizeVal">58</span>px</label>
  <input type="range" min="40" max="80" value="58" id="btnSize">
  
  <label>Fortryd knap størrelse <span class="val" id="undoSizeVal">50</span>px</label>
  <input type="range" min="30" max="70" value="50" id="undoSize">
  
  <label>Action gap <span class="val" id="gapVal">24</span>px</label>
  <input type="range" min="8" max="60" value="24" id="gapSize">
  
  <label>Kort border-radius <span class="val" id="radiusVal">20</span>px</label>
  <input type="range" min="0" max="40" value="20" id="radiusSize">
  
  <button onclick="exportLayout()">📋 Kopiér Layout Værdier</button>
  <pre id="output"></pre>
</div>

<script>
const phone = document.getElementById('phone');
const phoneRect = () => phone.getBoundingClientRect();

// Make elements draggable
document.querySelectorAll('.draggable').forEach(el => {
  let startX, startY, startTop, startLeft;
  
  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT') return;
    e.preventDefault();
    el.classList.add('active');
    startX = e.clientX;
    startY = e.clientY;
    startTop = el.offsetTop;
    startLeft = el.offsetLeft;
    
    const onMove = e2 => {
      const dy = e2.clientY - startY;
      const dx = e2.clientX - startX;
      el.style.top = (startTop + dy) + 'px';
      if (!el.classList.contains('header') && !el.classList.contains('categories') && !el.classList.contains('stats') && !el.classList.contains('actions')) {
        el.style.left = (startLeft + dx) + 'px';
      }
      updateOutput();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      el.classList.remove('active');
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
});

// Sliders
document.getElementById('btnSize').oninput = function() {
  document.getElementById('btnSizeVal').textContent = this.value;
  document.querySelectorAll('.action-btn.delete, .action-btn.keep').forEach(b => {
    b.style.width = this.value + 'px';
    b.style.height = this.value + 'px';
    b.style.fontSize = (this.value * 0.65) + 'px';
  });
  updateOutput();
};

document.getElementById('undoSize').oninput = function() {
  document.getElementById('undoSizeVal').textContent = this.value;
  const b = document.querySelector('.action-btn.undo');
  b.style.width = this.value + 'px';
  b.style.height = this.value + 'px';
  b.style.fontSize = (this.value * 0.6) + 'px';
  updateOutput();
};

document.getElementById('gapSize').oninput = function() {
  document.getElementById('gapVal').textContent = this.value;
  document.getElementById('actions').style.gap = this.value + 'px';
  updateOutput();
};

document.getElementById('radiusSize').oninput = function() {
  document.getElementById('radiusVal').textContent = this.value;
  document.getElementById('card').style.borderRadius = this.value + 'px';
  updateOutput();
};

function updateOutput() {
  const card = document.getElementById('card');
  const stats = document.getElementById('stats');
  const actions = document.getElementById('actions');
  const pr = phoneRect();
  
  document.getElementById('output').textContent = 
`// Layout values (copy to Eric):
stats.top: ${stats.offsetTop}px
card.top: ${card.offsetTop}px
card.width: ${card.offsetWidth}px  
card.height: ${card.offsetHeight}px
card.borderRadius: ${document.getElementById('radiusSize').value}px
actions.bottom: ${812 - actions.offsetTop - actions.offsetHeight}px
btnSize: ${document.getElementById('btnSize').value}px
undoSize: ${document.getElementById('undoSize').value}px
gap: ${document.getElementById('gapSize').value}px`;
}

function exportLayout() {
  const out = document.getElementById('output').textContent;
  navigator.clipboard.writeText(out).then(() => alert('Kopieret!'));
}

updateOutput();
</script>
</body>
</html>
